<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pembayaran - Ngebut.in Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- Tambahan jsPDF & html2canvas sesuai spesifikasi laporan -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body class="dashboard-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-admin-nav">
        <button class="sidebar-toggle-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <img src="../assets/img/logo.png" alt="Logo" style="height: 35px; mix-blend-mode: multiply;">
        <div style="width: 24px;"></div>
    </div>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="../index.html" class="logo" style="display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;">
          <img src="../assets/img/logo.png" alt="Ngebut.in Logo" style="height: 70px; width: auto; object-fit: contain; mix-blend-mode: multiply; filter: brightness(1.05) contrast(1.05);">
        </a>
        <div class="user-profile">
          <div class="user-avatar">A</div>
          <div class="user-info">
            <h4>Administrator</h4>
            <p><i class="fas fa-shield-alt"></i> Super Admin</p>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="kendaraan.html" class="nav-item">
          <i class="fas fa-motorcycle"></i> Kelola Kendaraan
        </a>
        <a href="booking.html" class="nav-item">
          <i class="fas fa-calendar-check"></i> Approval Booking
        </a>
        <a href="pembayaran.html" class="nav-item active">
          <i class="fas fa-credit-card"></i> Pembayaran
        </a>
        <a href="users.html" class="nav-item">
          <i class="fas fa-users"></i> Manajemen User
        </a>
        <a href="#" class="nav-item logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="page-title">
          <h1>Manajemen Pembayaran</h1>
          <p>Konfirmasi pembayaran dan cetak kuitansi</p>
        </div>
        <div style="display: flex; gap: 10px;">
          <button class="btn btn-outline" onclick="exportToCSV()" title="Export CSV">
            <i class="fas fa-file-csv"></i>
          </button>
          <button class="btn btn-primary" onclick="exportToExcel()" style="background: #1D6F42; border-color: #1D6F42;">
            <i class="fas fa-file-excel"></i> Export Excel (Premium)
          </button>
        </div>
      </div>

      <div class="filter-tabs" style="margin-bottom: 1.5rem">
        <button class="filter-tab active" onclick="setFilter('booked', event)">
          <i class="fas fa-motorcycle"></i> Menunggu Pembayaran
        </button>
        <button class="filter-tab" onclick="setFilter('paid', event)">
          <i class="fas fa-check-circle"></i> Sudah Dibayar
        </button>
        <button class="filter-tab" onclick="setFilter('returning', event)">
          <i class="fas fa-undo"></i> Permintaan Kembali
        </button>
      </div>

      <div id="paymentGrid" class="motor-grid"></div>
    </main>

    <div id="invoiceModal" class="modal-overlay no-print">
      <div class="modal" style="max-width: 600px">
        <div class="modal-header no-print">
          <h3><i class="fas fa-receipt"></i> Kuitansi Pembayaran</h3>
          <button class="modal-close" onclick="closeInvoiceModal()">
            &times;
          </button>
        </div>
        <div class="modal-body" id="invoiceContent"></div>
        <div class="modal-footer no-print">
          <button class="btn btn-outline" onclick="closeInvoiceModal()">
            Tutup
          </button>
          <button class="btn btn-primary" onclick="printInvoice()">
            <i class="fas fa-print"></i> Cetak Kuitansi
          </button>
        </div>
      </div>
    </div>

    <script src="../assets/js/api-client.js?v=2.0"></script>
    <script src="../assets/js/script.js?v=2.0"></script>

    <script>
      const user = getCurrentUser();
      if (!user || user.role !== "admin") {
        window.location.href = "../login.html";
      }

      let currentFilter = "booked";
      let currentInvoiceData = null;

      function setFilter(filter, event) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-tab")
          .forEach((tab) => tab.classList.remove("active"));
        event.target.classList.add("active");
        renderPayments();
      }

      function renderPayments() {
        let bookings = getBooking();
        const motors = getMotor();
        const grid = document.getElementById("paymentGrid");

        // 🔥 DEBUG
        console.log("SEMUA BOOKING:", bookings);

        // 🔥 FILTER DIPERBAIKI (ANTI HILANG)
        if (currentFilter === "booked") {
          bookings = bookings.filter(
            (b) =>
              b.status === "booked" ||
              b.status === "approved" ||
              b.status === "confirm",
          );
        } else if (currentFilter === "returning") {
          bookings = bookings.filter((b) => b.status === "returning");
        } else {
          bookings = bookings.filter((b) => b.status === "paid" || b.status === "done");
        }

        if (bookings.length === 0) {
          grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--gray-500);">
                    <i class="fas fa-credit-card" style="font-size: 3rem; opacity: 0.3; margin-bottom: 1rem;"></i>
                    <h3>Tidak ada data</h3>
                </div>
            `;
          return;
        }

        grid.innerHTML = bookings
          .map((b) => {
            const motor = motors.find((m) => m.id === b.motorId);
            const days = calculateDays(b.startDate, b.endDate);
            
            // Logika Denda Keterlambatan
            const now = new Date();
            const endDateObj = new Date(b.endDate);
            now.setHours(0,0,0,0);
            endDateObj.setHours(0,0,0,0);
            
            let lateBadge = "";
            if (b.status === "paid" && now > endDateObj) {
                const lateDays = Math.ceil((now - endDateObj) / (1000 * 60 * 60 * 24));
                const denda = lateDays * 50000; // Denda Rp 50.000 / hari
                lateBadge = `<div style="color: var(--danger); font-size: 0.8rem; font-weight: bold; margin-top: 5px;"><i class="fas fa-exclamation-triangle"></i> Terlambat ${lateDays} Hari (Denda: ${formatRupiah(denda)})</div>`;
            }

            return `
                <div class="motor-card">
                    <div class="motor-image">
                        <img src="${getMotorImage(motor?.gambar)}" onerror="this.src='https://placehold.co/400x300/1A1A1A/white?text=Motor'">
                        <span class="motor-badge ${['paid', 'returning', 'done'].includes(b.status) ? 'badge-available' : 'badge-booked'}">
                            ${['paid', 'returning', 'done'].includes(b.status) ? 'LUNAS' : 'BELUM BAYAR'}
                        </span>
                    </div>

                    <div class="motor-content">
                        <h3 class="motor-title">${b.motorName}</h3>

                        <p class="motor-desc">
                            <i class="fas fa-user"></i> ${b.userName}<br>
                            <i class="fas fa-calendar"></i> ${formatShortDate(b.startDate)} - ${formatShortDate(b.endDate)}<br>
                            <i class="fas fa-clock"></i> ${days} hari
                            ${lateBadge}
                        </p>

                        <div class="motor-price">
                            <span class="price-amount">${formatRupiah(b.totalHarga)}</span>
                        </div>

                        ${
                          b.status === "paid"
                            ? `
                            <button class="btn btn-outline" style="width:100%;margin-top:1rem;" onclick="showInvoice(${b.id})">
                                <i class="fas fa-receipt"></i> Lihat Kuitansi
                            </button>
                        `
                            : b.status === "returning" 
                            ? `
                            <button class="btn btn-sm" style="width:100%;margin-top:1rem; background: var(--success); color: white;" onclick="confirmDone(${b.id})">
                                <i class="fas fa-check-double"></i> Konfirmasi Selesai Sewa
                            </button>
                            `
                            : `
                            <button class="btn btn-primary" style="width:100%;margin-top:1rem;" onclick="confirmPayment(${b.id})">
                                <i class="fas fa-check-circle"></i> Konfirmasi Pembayaran
                            </button>
                        `
                        }
                    </div>
                </div>
            `;
          })
          .join("");
      }

      // ✅ KONFIRMASI PEMBAYARAN
      function confirmPayment(bookingId) {
        if (!confirm("Konfirmasi pembayaran untuk booking ini?")) return;

        const success = updateBookingStatus(bookingId, "paid");
        if (success) {
            alert("✅ Pembayaran berhasil dikonfirmasi!");
            renderPayments();
            showInvoice(bookingId);
        } else {
            alert("❌ Gagal mengonfirmasi pembayaran.");
        }
      }

      // ✅ KONFIRMASI SELESAI SEWA
      function confirmDone(bookingId) {
        if (!confirm("Konfirmasi bahwa motor sudah dikembalikan dan sewa selesai?")) return;

        const success = updateBookingStatus(bookingId, "done");
        if (success) {
            alert("✅ Sewa berhasil diselesaikan! Motor kini berstatus tersedia kembali.");
            renderPayments();
        } else {
            alert("❌ Gagal memproses data.");
        }
      }

      // ✅ KUITANSI FINAL
      function showInvoice(id) {
        const booking = getBooking().find((b) => String(b.id) === String(id));
        if (!booking) return;

        const days = calculateDays(booking.startDate, booking.endDate);

        document.getElementById("invoiceContent").innerHTML = `
            <div style="font-family: 'Inter', system-ui, -apple-system, sans-serif; padding: 40px; background: white; color: #1a1a1a; max-width: 800px; margin: auto; border: 1px solid #eee;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 50px;">
                    <div>
                        <img src="../assets/img/logo.png" alt="Ngebut.in" style="height: 60px; margin-bottom: 15px; mix-blend-mode: multiply;">
                        <p style="font-size: 14px; color: #666; line-height: 1.6; margin: 0;">
                            Jl. DI Panjaitan No. 128<br>
                            Purwokerto Selatan, Banyumas<br>
                            Telp: (022) 123-4567<br>
                            Halo@ngebut.in
                        </p>
                    </div>
                    <div style="text-align: right;">
                        <h1 style="margin: 0; color: #cc0000; font-size: 28px; font-weight: 800; letter-spacing: -0.5px;">KUITANSI</h1>
                        <p style="font-size: 16px; font-weight: 600; margin: 5px 0 0;">#${booking.id.toString().slice(-6)}</p>
                        <p style="font-size: 14px; color: #666; margin: 5px 0 0;">${formatDate(new Date())}</p>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; padding: 25px; background: #f9fafb; border-radius: 12px;">
                    <div>
                        <h4 style="margin: 0 0 10px; color: #666; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Ditujukan Kepada</h4>
                        <p style="margin: 0; font-weight: 700; font-size: 16px;">${booking.userName}</p>
                        <p style="margin: 5px 0 0; color: #666; font-size: 14px;">Penyewa Terverifikasi</p>
                    </div>
                    <div style="text-align: right;">
                        <h4 style="margin: 0 0 10px; color: #666; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Status Pembayaran</h4>
                        <span style="display: inline-block; padding: 6px 12px; background: #dcfce7; color: #166534; border-radius: 20px; font-weight: 700; font-size: 12px;">LUNAS</span>
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
                    <thead>
                        <tr style="border-bottom: 2px solid #1a1a1a;">
                            <th style="text-align: left; padding: 15px 0; font-size: 13px; color: #666; text-transform: uppercase;">Deskripsi Unit</th>
                            <th style="text-align: center; padding: 15px 0; font-size: 13px; color: #666; text-transform: uppercase;">Durasi</th>
                            <th style="text-align: right; padding: 15px 0; font-size: 13px; color: #666; text-transform: uppercase;">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 25px 0;">
                                <p style="margin: 0; font-weight: 700; font-size: 16px;">${booking.motorName}</p>
                                <p style="margin: 5px 0 0; color: #666; font-size: 13px;">Sewa Motor ${formatShortDate(booking.startDate)} - ${formatShortDate(booking.endDate)}</p>
                            </td>
                            <td style="text-align: center; padding: 25px 0; font-weight: 600;">${days} Hari</td>
                            <td style="text-align: right; padding: 25px 0; font-weight: 700; font-size: 16px;">${formatRupiah(booking.totalHarga)}</td>
                        </tr>
                    </tbody>
                </table>

                <div style="display: flex; justify-content: flex-end; margin-bottom: 60px;">
                    <div style="width: 250px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span style="color: #666;">Subtotal</span>
                            <span style="font-weight: 600;">${formatRupiah(booking.totalHarga)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding-top: 15px; border-top: 2px solid #1a1a1a;">
                            <span style="font-weight: 800; font-size: 18px;">TOTAL</span>
                            <span style="font-weight: 800; font-size: 18px; color: #cc0000;">${formatRupiah(booking.totalHarga)}</span>
                        </div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: flex-end; font-size: 12px; color: #999;">
                    <div>
                        <p style="margin: 0;"><b>Catatan:</b></p>
                        <p style="margin: 5px 0 0;">Kuitansi ini adalah bukti pembayaran yang sah dan dihasilkan secara otomatis oleh sistem.</p>
                    </div>
                    <div style="text-align: center; min-width: 150px;">
                        <div style="margin-bottom: 10px; height: 40px;">
                             <img src="../assets/img/logo.png" style="height: 30px; opacity: 0.3; filter: grayscale(1);">
                        </div>
                        <p style="margin: 0; font-weight: 700; color: #666;">NGEBUT.IN OFFICIAL</p>
                    </div>
                </div>
            </div>
        `;

        document.getElementById("invoiceModal").style.display = "flex";
      }

      function closeInvoiceModal() {
        document.getElementById("invoiceModal").style.display = "none";
      }

      async function printInvoice() {
        const { jsPDF } = window.jspdf;
        const invoiceContent = document.getElementById("invoiceContent");
        
        // Hide scrollbar and adjust styling temporarily for better render
        const originalBg = invoiceContent.style.background;
        invoiceContent.style.background = "white";
        
        try {
            const canvas = await html2canvas(invoiceContent, {
                scale: 2,
                useCORS: true
            });
            
            const imgData = canvas.toDataURL("image/png");
            const pdf = new jsPDF("p", "mm", "a4");
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            
            // Add image to PDF
            pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
            
            // Generate filename based on date
            const dateStr = new Date().getTime();
            pdf.save(`Kuitansi_NgebutIN_${dateStr}.pdf`);
            
        } catch (error) {
            console.error("Gagal membuat PDF:", error);
            alert("Terjadi kesalahan saat membuat kuitansi PDF.");
        } finally {
            invoiceContent.style.background = originalBg;
        }
      }

      document
        .getElementById("invoiceModal")
        .addEventListener("click", function (e) {
          if (e.target === this) closeInvoiceModal();
        });

      function exportToExcel() {
        window.location.href = window.location.origin + '/api/export/excel';
      }

      function exportToCSV() {
        const bookings = getBooking().filter(b => b.status === "paid" || b.status === "done");
        if (bookings.length === 0) {
            alert("Tidak ada data transaksi untuk diexport!");
            return;
        }

        // Gunakan BOM & sep=, agar Excel membagi kolom secara otomatis
        let csvContent = "\uFEFFsep=,\n"; 
        csvContent += "ID Transaksi,Penyewa,Motor,Tanggal Sewa,Tanggal Kembali,Durasi,Total Harga,Status\n";

        const headers = ["ID Transaksi", "Penyewa", "Email", "Motor", "Tgl Mulai", "Tgl Selesai", "Durasi", "Total Bayar", "Status", "Waktu Transaksi"];
        const rows = bookings.map(b => [
            `#${b.id.toString().slice(-6)}`,
            b.userName,
            b.userEmail || "-",
            b.motorName,
            b.startDate,
            b.endDate,
            `${calculateDays(b.startDate, b.endDate)} Hari`,
            formatRupiah(b.totalHarga),
            b.status.toUpperCase(),
            b.createdAt
        ]);

        downloadCSV("Laporan_Pembayaran_NgebutIN.csv", headers, rows, "Laporan Riwayat Transaksi & Pembayaran");
      }

      renderPayments();
      setInterval(renderPayments, 5000);
    </script>
  </body>
</html>
