<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen User - Ngebut.in Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dashboard-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-admin-nav">
        <button class="sidebar-toggle-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <img src="../assets/img/logo.png" alt="Logo" style="height: 35px; mix-blend-mode: multiply;">
        <div style="width: 24px;"></div>
    </div>
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo" style="display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;">
                <img src="../assets/img/logo.png" alt="Ngebut.in Logo" style="height: 70px; width: auto; object-fit: contain; mix-blend-mode: multiply; filter: brightness(1.05) contrast(1.05);">
            </a>
            <div class="user-profile">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <h4>Administrator</h4>
                    <p><i class="fas fa-shield-alt"></i> Super Admin</p>
                </div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-pie"></i> Dashboard
            </a>
            <a href="kendaraan.html" class="nav-item">
                <i class="fas fa-motorcycle"></i> Kelola Kendaraan
            </a>
            <a href="booking.html" class="nav-item">
                <i class="fas fa-calendar-check"></i> Approval Booking
                <span id="pendingBadge" class="pending-badge" style="display: none; margin-left: auto; background: var(--danger); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem;">0</span>
            </a>
            <a href="pembayaran.html" class="nav-item">
                <i class="fas fa-credit-card"></i> Pembayaran
            </a>
            <a href="users.html" class="nav-item active">
                <i class="fas fa-users"></i> Manajemen User
            </a>
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>Manajemen User</h1>
                <p>Melihat data penyewa yang terdaftar di sistem.</p>
            </div>
        </div>

        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search" style="color: var(--gray-400);"></i>
                <input type="text" id="searchInput" placeholder="Cari nama atau email..." onkeyup="renderUsers()">
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active">Semua Pengguna</button>
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 2rem;">Memuat data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/api-client.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        // Proteksi halaman admin
        const currentUser = getCurrentUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = '../login.html';
        }

        // Render badge
        function updateBadge() {
            const bookings = getBooking();
            const pending = bookings.filter(b => b.status === 'confirm').length;
            const badge = document.getElementById('pendingBadge');
            if (badge) {
                badge.innerText = pending;
                badge.style.display = pending > 0 ? 'inline-block' : 'none';
            }
        }

        // Render Users
        function renderUsers() {
            const allUsers = getUsers();
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tableBody = document.getElementById('userTableBody');

            // Filter users except admin
            const customers = allUsers.filter(u => u.role !== 'admin');
            
            const filtered = customers.filter(u => 
                u.nama.toLowerCase().includes(searchTerm) || 
                u.email.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--gray-500);">Tidak ada user ditemukan</td></tr>`;
                return;
            }

            tableBody.innerHTML = filtered.map(u => `
                <tr>
                    <td><code>#${u.id}</code></td>
                    <td><strong>${u.nama}</strong></td>
                    <td>${u.email}</td>
                    <td><span style="background: var(--gray-100); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase;">${u.role || 'USER'}</span></td>
                    <td><span class="status-badge status-done"><i class="fas fa-check"></i> Aktif</span></td>
                </tr>
            `).join('');
        }

        updateBadge();
        renderUsers();
        setInterval(updateBadge, 5000);
    </script>
</body>
</html>
