<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ngebut.in</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-left-content">
                <a href="index.html" class="logo" style="display: flex; align-items: center; justify-content: center; background: white; padding: 15px; border-radius: 20px; box-shadow: var(--shadow-lg); margin-bottom: 2rem;">
                    <img src="assets/img/logo.png" alt="Ngebut.in Logo" style="height: 80px; width: auto; object-fit: contain;">
                </a>
                <h2>Gabung Sekarang! 🏍️</h2>
                <p>Buat akun gratis dan mulai sewa motor impianmu hari ini juga.</p>
                <div class="auth-features">
                    <div class="auth-feature">
                        <span class="feature-icon"><i class="fas fa-tag"></i></span>
                        <span>Harga spesial untuk member baru</span>
                    </div>
                    <div class="auth-feature">
                        <span class="feature-icon"><i class="fas fa-clock"></i></span>
                        <span>Proses booking kurang dari 2 menit</span>
                    </div>
                    <div class="auth-feature">
                        <span class="feature-icon"><i class="fas fa-star"></i></span>
                        <span>Poin rewards setiap transaksi</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-box">
                <h3>Daftar Akun</h3>
                <p class="auth-subtitle">Isi data diri kamu dengan lengkap</p>
                
                <div id="registerError" class="error-message"></div>
                
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="nama@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="Minimal 6 karakter" style="padding-right: 45px;">
                        <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray-400);"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmPassword" placeholder="••••••••" style="padding-right: 45px;">
                        <i class="fas fa-eye" id="toggleConfirm" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray-400);"></i>
                    </div>
                </div>
                
                <button class="btn btn-primary" style="width: 100%;" onclick="register()">
                    <i class="fas fa-user-plus"></i> Daftar Sekarang
                </button>
                
                <p class="auth-footer">
                    Sudah punya akun? <a href="login.html">Login disini</a>
                </p>
            </div>
        </div>
    </div>

    <script src="assets/js/api-client.js"></script>
    <script>
        async function register() {
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirm = document.getElementById('confirmPassword').value.trim();
            const errorEl = document.getElementById('registerError');

            errorEl.innerText = '';

            if (!nama || !email || !password || !confirm) {
                errorEl.innerText = 'Semua field wajib diisi';
                return;
            }

            if (password.length < 6) {
                errorEl.innerText = 'Password minimal 6 karakter';
                return;
            }

            if (password !== confirm) {
                errorEl.innerText = 'Password dan konfirmasi tidak cocok';
                return;
            }

            try {
                const result = await ApiClient.register(nama, email, password);
                if (result.error) {
                    errorEl.innerText = result.error;
                } else {
                    alert('✅ Registrasi berhasil! Silakan login.');
                    window.location.href = 'login.html';
                }
            } catch (err) {
                errorEl.innerText = 'Gagal menghubungkan ke server';
            }
        }

        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('toggleConfirm').addEventListener('click', function() {
            const password = document.getElementById('confirmPassword');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
