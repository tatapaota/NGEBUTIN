<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Saya - Ngebut.in</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dashboard-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-admin-nav">
        <button class="sidebar-toggle-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <img src="../assets/img/logo.png" alt="Logo" style="height: 35px; mix-blend-mode: multiply;">
        <div style="width: 24px;"></div>
    </div>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo" style="display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;">
                <img src="../assets/img/logo.png" alt="Ngebut.in Logo" style="height: 70px; width: auto; object-fit: contain; mix-blend-mode: multiply; filter: brightness(1.05) contrast(1.05);">
            </a>
            <div class="user-profile" id="userProfile"></div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="booking.html" class="nav-item active">
                <i class="fas fa-calendar-alt"></i> Booking Saya
            </a>
            <a href="riwayat.html" class="nav-item">
                <i class="fas fa-history"></i> Riwayat
            </a>
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>Booking Saya</h1>
                <p>Pantau status penyewaan motor Anda</p>
            </div>
        </div>

        <div id="notificationArea"></div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Motor</th>
                        <th>Tanggal Sewa</th>
                        <th>Durasi</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="bookingList">
                    <tr><td colspan="6" style="text-align: center; padding: 2rem;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/api-client.js?v=2.0"></script>
    <script src="../assets/js/script.js?v=2.0"></script>
    <script>
        const user = getCurrentUser();
        if (!user) window.location.href = '../login.html';

        document.getElementById('userProfile').innerHTML = `
            <div class="user-avatar">${user.nama.charAt(0).toUpperCase()}</div>
            <div class="user-info">
                <h4>${user.nama}</h4>
                <p><i class="fas fa-user"></i> Member</p>
            </div>
        `;

        function checkNotifications() {
            const notifications = checkReturnNotifications(user.id);
            const area = document.getElementById('notificationArea');
            
            if (notifications.length > 0) {
                area.innerHTML = notifications.map(n => `
                    <div class="notification notification-${n.type}">
                        <span class="notification-icon"><i class="fas ${n.icon}"></i></span>
                        <div class="notification-content">
                            <div class="notification-title">${n.title}</div>
                            <div>${n.message}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function kembalikanMotor(bookingId, btn) {
            if (!confirm('Apakah Anda yakin sudah selesai menyewa dan ingin mengembalikan motor ini?')) return;
            
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>...';

            const success = updateBookingStatus(bookingId, 'returning');
            if (success) {
                alert('✅ Permintaan pengembalian dikirim! Silakan hubungi admin untuk pengecekan fisik motor.');
                renderBookings();
            } else {
                alert('❌ Gagal memproses pengembalian.');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function renderBookings() {
            syncAutoDone();
            const allBookings = getBooking();
            const bookings = allBookings.filter(b => 
                String(b.userId) === String(user.id) && 
                ['confirm', 'booked', 'paid', 'returning'].includes(b.status)
            );
            
            const tbody = document.getElementById('bookingList');
            const thead = document.querySelector('.data-table thead');
            
            if (bookings.length === 0) {
                if(thead) thead.style.display = 'none';
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 3rem; color: var(--gray-500); border: none;">
                    <i class="fas fa-calendar" style="font-size: 3rem; opacity: 0.3; margin-bottom: 1rem;"></i>
                    <h3>Tidak ada booking aktif</h3>
                    <a href="dashboard.html" class="btn btn-primary" style="margin-top: 1rem;">Sewa Motor Sekarang</a>
                </td></tr>`;
                return;
            }

            if(thead) {
                thead.style.display = '';
                thead.style.display = 'table-header-group'; 
            }

            tbody.innerHTML = bookings.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(b => {
                const days = calculateDays(b.startDate, b.endDate);
                let aksiHtml = '-';
                
                if (b.status === 'paid') {
                    aksiHtml = `
                        <button class="btn btn-sm" style="background: var(--success); color: white; border-radius: 20px; padding: 5px 15px;" onclick="kembalikanMotor(${b.id}, this)">
                            <i class="fas fa-undo"></i> Selesai Sewa
                        </button>
                    `;
                } else if (b.status === 'returning') {
                    aksiHtml = '<span style="color: var(--warning); font-size: 0.8rem;"><i class="fas fa-clock"></i> Menunggu Admin</span>';
                }

                return `
                    <tr>
                        <td><strong>${b.motorName}</strong></td>
                        <td>${formatShortDate(b.startDate)} - ${formatShortDate(b.endDate)}</td>
                        <td>${days} hari</td>
                        <td>${formatRupiah(b.totalHarga)}</td>
                        <td>${getStatusBadge(b.status)}</td>
                        <td>${aksiHtml}</td>
                    </tr>
                `;
            }).join('');
        }

        checkNotifications();
        renderBookings();
        setInterval(() => { renderBookings(); checkNotifications(); }, 10000);
    </script>
</body>
</html>
