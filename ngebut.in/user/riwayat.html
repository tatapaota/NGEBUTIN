<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Booking - Ngebut.in</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="dashboard-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-admin-nav">
        <button class="sidebar-toggle-btn" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <img src="../assets/img/logo.png" alt="Logo" style="height: 35px; mix-blend-mode: multiply;">
        <div style="width: 24px;"></div>
    </div>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo" style="display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;">
                <img src="../assets/img/logo.png" alt="Ngebut.in Logo" style="height: 70px; width: auto; object-fit: contain; mix-blend-mode: multiply; filter: brightness(1.05) contrast(1.05);">
            </a>
            <div class="user-profile" id="userProfile"></div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="booking.html" class="nav-item">
                <i class="fas fa-calendar-alt"></i> Booking Saya
            </a>
            <a href="riwayat.html" class="nav-item active">
                <i class="fas fa-history"></i> Riwayat
            </a>
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>Riwayat Booking</h1>
                <p>Daftar transaksi yang sudah selesai</p>
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Motor</th>
                        <th>Tanggal Sewa</th>
                        <th>Tanggal Kembali</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="riwayatList">
                    <tr><td colspan="6" style="text-align: center; padding: 2rem;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- HIDDEN INVOICE TEMPLATE FOR PRINTING -->
        <div id="invoiceTemplate" style="display:none; width:600px; padding:20px; background:white; color:black;">
            <div id="invoiceContent" class="invoice-wrap">
                <!-- Content will be injected here -->
            </div>
        </div>
    </main>

    <script src="../assets/js/api-client.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
    const user = getCurrentUser();
    if (!user) window.location.href = '../login.html';

    document.getElementById('userProfile').innerHTML = `
        <div class="user-avatar">${user.nama.charAt(0).toUpperCase()}</div>
        <div class="user-info">
            <h4>${user.nama}</h4>
            <p><i class="fas fa-user"></i> Member</p>
        </div>
    `;

    function renderRiwayat() {
        // ✔ pastikan status auto update dulu
        syncAutoDone();

        // ✔ ambil data terbaru setelah update
        const allBookings = getBooking();

        const bookings = allBookings.filter(b => 
            String(b.userId) === String(user.id) && 
            ['done', 'cancelled'].includes(b.status)
        );
        
        const tbody = document.getElementById('riwayatList');
        const thead = document.querySelector('.data-table thead');
        
        if (bookings.length === 0) {
            if(thead) thead.style.display = 'none';
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 3rem; color: var(--gray-500); border: none;">
                <i class="fas fa-history" style="font-size: 3rem; opacity: 0.3; margin-bottom: 1rem;"></i>
                <h3>Belum ada riwayat booking</h3>
            </td></tr>`;
            return;
        }

        if(thead) {
            thead.style.display = '';
            // For mobile compatibility, ensure headers are visible
            thead.style.display = 'table-header-group'; 
        }

        tbody.innerHTML = bookings
            .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
            .map(b => `
                <tr>
                    <td><strong>${b.motorName}</strong></td>
                    <td>${formatShortDate(b.startDate)}</td>
                    <td>${formatShortDate(b.endDate)}</td>
                    <td>${formatRupiah(b.totalHarga)}</td>
                    <td>${getStatusBadge(b.status)}</td>
                    <td>
                        <button class="btn btn-outline" style="padding: 0.5rem 1rem;" onclick="downloadInvoice(${b.id})">
                            <i class="fas fa-file-pdf"></i> Kwitansi
                        </button>
                    </td>
                </tr>
            `).join('');
    }

    async function downloadInvoice(bookingId) {
        const bookings = getBooking();
        const booking = bookings.find(b => String(b.id) === String(bookingId));
        if(!booking) return;

        const days = calculateDays(booking.startDate, booking.endDate);
        const tarif = booking.totalHarga / days;

        document.getElementById("invoiceContent").innerHTML = `
            <div style="font-family: 'Inter', system-ui, -apple-system, sans-serif; padding: 40px; background: white; color: #1a1a1a; max-width: 800px; margin: auto; border: 1px solid #eee;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 50px;">
                    <div>
                        <img src="../assets/img/logo.png" alt="Ngebut.in" style="height: 60px; margin-bottom: 15px; mix-blend-mode: multiply;">
                        <p style="font-size: 14px; color: #666; line-height: 1.6; margin: 0;">
                            Jl. DI Panjaitan No. 128<br>
                            Purwokerto Selatan, Banyumas<br>
                            Telp: (022) 123-4567<br>
                            Halo@ngebut.in
                        </p>
                    </div>
                    <div style="text-align: right;">
                        <h1 style="margin: 0; color: #cc0000; font-size: 28px; font-weight: 800; letter-spacing: -0.5px;">KUITANSI</h1>
                        <p style="font-size: 16px; font-weight: 600; margin: 5px 0 0;">#${booking.id.toString().slice(-6)}</p>
                        <p style="font-size: 14px; color: #666; margin: 5px 0 0;">${formatDate(new Date())}</p>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; padding: 25px; background: #f9fafb; border-radius: 12px;">
                    <div>
                        <h4 style="margin: 0 0 10px; color: #666; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Ditujukan Kepada</h4>
                        <p style="margin: 0; font-weight: 700; font-size: 16px;">${booking.userName}</p>
                        <p style="margin: 5px 0 0; color: #666; font-size: 14px;">Penyewa Terverifikasi</p>
                    </div>
                    <div style="text-align: right;">
                        <h4 style="margin: 0 0 10px; color: #666; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Status Pembayaran</h4>
                        <span style="display: inline-block; padding: 6px 12px; background: #dcfce7; color: #166534; border-radius: 20px; font-weight: 700; font-size: 12px;">LUNAS</span>
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
                    <thead>
                        <tr style="border-bottom: 2px solid #1a1a1a;">
                            <th style="text-align: left; padding: 15px 0; font-size: 13px; color: #666; text-transform: uppercase;">Deskripsi Unit</th>
                            <th style="text-align: center; padding: 15px 0; font-size: 13px; color: #666; text-transform: uppercase;">Durasi</th>
                            <th style="text-align: right; padding: 15px 0; font-size: 13px; color: #666; text-transform: uppercase;">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 25px 0;">
                                <p style="margin: 0; font-weight: 700; font-size: 16px;">${booking.motorName}</p>
                                <p style="margin: 5px 0 0; color: #666; font-size: 13px;">Sewa Motor ${formatShortDate(booking.startDate)} - ${formatShortDate(booking.endDate)}</p>
                            </td>
                            <td style="text-align: center; padding: 25px 0; font-weight: 600;">${days} Hari</td>
                            <td style="text-align: right; padding: 25px 0; font-weight: 700; font-size: 16px;">${formatRupiah(booking.totalHarga)}</td>
                        </tr>
                    </tbody>
                </table>

                <div style="display: flex; justify-content: flex-end; margin-bottom: 60px;">
                    <div style="width: 250px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span style="color: #666;">Subtotal</span>
                            <span style="font-weight: 600;">${formatRupiah(booking.totalHarga)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding-top: 15px; border-top: 2px solid #1a1a1a;">
                            <span style="font-weight: 800; font-size: 18px;">TOTAL</span>
                            <span style="font-weight: 800; font-size: 18px; color: #cc0000;">${formatRupiah(booking.totalHarga)}</span>
                        </div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: flex-end; font-size: 12px; color: #999;">
                    <div>
                        <p style="margin: 0;"><b>Catatan:</b></p>
                        <p style="margin: 5px 0 0;">Kuitansi ini adalah bukti pembayaran yang sah dan dihasilkan secara otomatis oleh sistem.</p>
                    </div>
                    <div style="text-align: center; min-width: 150px;">
                        <div style="margin-bottom: 10px; height: 40px;">
                             <img src="../assets/img/logo.png" style="height: 30px; opacity: 0.3; filter: grayscale(1);">
                        </div>
                        <p style="margin: 0; font-weight: 700; color: #666;">NGEBUT.IN OFFICIAL</p>
                    </div>
                </div>
            </div>
        `;

        const template = document.getElementById("invoiceTemplate");
        template.style.display = "block"; // temporarily show to render
        
        try {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.getElementById("invoiceContent"), {
                scale: 2,
                useCORS: true
            });
            const imgData = canvas.toDataURL("image/png");
            const pdf = new jsPDF("p", "mm", "a4");
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
            pdf.save(`Kuitansi_NgebutIN_${booking.id}.pdf`);
        } catch (error) {
            console.error("PDF Error", error);
            alert("Gagal mengunduh kwitansi");
        } finally {
            template.style.display = "none";
        }
    }

    renderRiwayat();
    setInterval(renderRiwayat, 10000);
</script>
