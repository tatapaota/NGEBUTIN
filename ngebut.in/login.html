<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Ngebut.in</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-left">
        <div class="auth-left-content">
          <a
            href="index.html"
            class="logo"
            style="
              display: flex;
              align-items: center;
              justify-content: center;
              background: white;
              padding: 15px;
              border-radius: 20px;
              box-shadow: var(--shadow-lg);
              margin-bottom: 2rem;
            "
          >
            <img
              src="assets/img/logo.png"
              alt="Ngebut.in Logo"
              style="height: 80px; width: auto; object-fit: contain"
            />
          </a>
          <h2>Selamat Datang Kembali! 👋</h2>
          <p>
            Masuk ke akunmu dan lanjutkan perjalananmu bersama motor impian.
          </p>
          <div class="auth-features">
            <div class="auth-feature">
              <span class="feature-icon"><i class="fas fa-bolt"></i></span>
              <span>Proses booking super cepat</span>
            </div>
            <div class="auth-feature">
              <span class="feature-icon"
                ><i class="fas fa-shield-alt"></i
              ></span>
              <span>Transaksi aman & terpercaya</span>
            </div>
            <div class="auth-feature">
              <span class="feature-icon"><i class="fas fa-headset"></i></span>
              <span>Support 24/7 siap membantu</span>
            </div>
          </div>
        </div>
      </div>
      <div class="auth-right">
        <div class="auth-box">
          <h3>Login</h3>
          <p class="auth-subtitle">Masukkan email dan password kamu</p>

          <div id="loginError" class="error-message"></div>

          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="nama@email.com"
              value=""
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div style="position: relative">
              <input
                type="password"
                id="loginPassword"
                placeholder="••••••••"
                style="padding-right: 45px"
              />
              <i
                class="fas fa-eye"
                id="togglePassword"
                style="
                  position: absolute;
                  right: 15px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  color: var(--gray-400);
                "
              ></i>
            </div>
          </div>

          <button class="btn btn-primary" style="width: 100%" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Masuk
          </button>

          <p class="auth-footer">
            Belum punya akun? <a href="register.html">Daftar gratis</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Pastikan script api-client Anda tetap di-load jika file lain membutuhkannya -->
    <!-- Pastikan script api-client Anda tetap di-load jika file lain membutuhkannya -->
    <script src="assets/js/api-client.js"></script>
    <script>
      async function login() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const errorEl = document.getElementById("loginError");

        if (!email || !password) {
          errorEl.innerText = "Email dan password harus diisi";
          return;
        }

        try {
          const result = await ApiClient.login(email, password);

          if (result.error) {
            errorEl.innerText = result.error;
          } else {
            const user = ApiClient.getCurrentUser();

            if (user.role === "admin") {
              window.location.href = "admin/dashboard.html";
            } else if (user.role === "owner") {
              window.location.href = "owner/dashboard.html";
            } else {
              window.location.href = "user/dashboard.html";
            }
          }
        } catch (err) {
          errorEl.innerText = "Gagal menghubungkan ke server";
        }
      }

      // Toggle Password Visibility
      document
        .getElementById("togglePassword")
        .addEventListener("click", function () {
          const password = document.getElementById("loginPassword");
          const type =
            password.getAttribute("type") === "password" ? "text" : "password";

          password.setAttribute("type", type);
          this.classList.toggle("fa-eye-slash");
        });

      // Enter key to login
      document.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          login();
        }
      });
    </script>
  </body>
</html>
